<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing Journey Map &mdash; Agentic Hypothesis</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --color-text-default: #0F172A;
      --color-text-secondary: #64748B;
    }
    body { background: #F8FAFC; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .node { transition: all 0.4s ease; }
    .node.dimmed { opacity: 0.2; pointer-events: none; }
    .conn { transition: opacity 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .fade-in { animation: fadeIn 0.25s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const App = () => {
      const [mode, setMode] = useState('agentic');
      const [hovered, setHovered] = useState(null);
      const [hoveredSeam, setHoveredSeam] = useState(null);

      const isAgentic = mode === 'agentic';

      // === LAYOUT CONSTANTS ===
      const svgW = 1000;
      const svgH = isAgentic ? 330 : 360;

      // Layer Y positions
      const lySlg = { pricing: 75, operations: 155, infrastructure: 235, customer: 315 };
      const lyAg = { judgment: 85, agents: 200, customer: 295 };

      // === PERSONAS ===
      const P = {
        peter:   { name: 'Peter',    role: 'Pricing',  color: '#7C3AED' },
        emily:   { name: 'Emily',    role: 'Eng',      color: '#475569' },
        diana:   { name: 'Diana',    role: 'Data',     color: '#475569' },
        oliver:  { name: 'Oliver',   role: 'Ops',      color: '#4F46E5' },
        fred:    { name: 'Fred',     role: 'Finance',  color: '#0D9488' },
        caroline:{ name: 'Caroline', role: 'Customer', color: '#0D9488' },
      };

      // Positions per mode
      const pos = {
        slg: {
          peter:    { x: 170,  y: lySlg.pricing },
          diana:    { x: 370,  y: lySlg.infrastructure },
          emily:    { x: 540,  y: lySlg.infrastructure },
          oliver:   { x: 700,  y: lySlg.operations },
          fred:     { x: 830,  y: lySlg.customer },
          caroline: { x: 940,  y: lySlg.customer },
        },
        plg: {
          peter:    { x: 170,  y: lySlg.pricing },
          diana:    { x: 370,  y: lySlg.infrastructure },
          emily:    { x: 540,  y: lySlg.infrastructure },
          oliver:   { x: 700,  y: lySlg.operations, inactive: true },
          fred:     { x: 830,  y: lySlg.customer },
          caroline: { x: 940,  y: lySlg.customer },
        },
        agentic: {
          peter:    { x: 140,  y: lyAg.judgment, sub: 'Strategist' },
          diana:    { x: 260,  y: lyAg.judgment, sub: 'Data Arch.' },
          emily:    { x: 375,  y: lyAg.judgment, sub: 'Architect' },
          fred:     { x: 490,  y: lyAg.judgment, sub: 'Policy' },
          oliver:   { x: 0, y: 0, hidden: true },
          caroline: { x: 790,  y: lyAg.customer },
        },
      };

      // Agent nodes (agentic mode only)
      const agents = isAgentic ? [
        { id: 'a-model',     name: 'Revenue Modeling',  x: 140,  y: lyAg.agents },
        { id: 'a-implement', name: 'Implementation',    x: 320,  y: lyAg.agents },
        { id: 'a-validate',  name: 'Validation',        x: 490,  y: lyAg.agents },
        { id: 'a-contract',  name: 'Contract Config',   x: 700,  y: lyAg.agents },
        { id: 'a-reconcile', name: 'Reconciliation',    x: 860,  y: lyAg.agents },
      ] : [];

      // === CONNECTIONS ===
      // Agentic connections use semantic types:
      //   'direct'      — Active direction, required every time (Peter triggers the flow)
      //   'policy'      — Guardrails defined once, agents enforce continuously (Fred's rules)
      //   'conditional'  — Human joins only when complexity requires it (Emily, Diana)
      //   'chain'       — Agent-to-agent flow, the operational spine
      //   'feedback'    — Agent escalates to human, learning loop
      const conns = {
        slg: [
          { from: 'peter',  to: 'diana',    label: 'Usage data' },
          { from: 'fred',   to: 'diana',    label: 'Revenue projections' },
          { from: 'peter',  to: 'emily',    label: 'Requirements' },
          { from: 'fred',   to: 'emily',    label: 'RevRec requirements' },
          { from: 'emily',  to: 'oliver',   label: 'Config handoff', friction: true },
          { from: 'emily',  to: 'peter',    label: 'Validation' },
          { from: 'oliver', to: 'caroline', label: 'Invoice' },
          { from: 'caroline', to: 'oliver', label: 'Billing issues' },
          { from: 'fred',   to: 'emily',    label: 'Reconciliation' },
        ],
        plg: [
          { from: 'peter',  to: 'diana',    label: 'Usage data' },
          { from: 'fred',   to: 'diana',    label: 'Revenue projections' },
          { from: 'peter',  to: 'emily',    label: 'Requirements' },
          { from: 'fred',   to: 'emily',    label: 'RevRec requirements' },
          { from: 'emily',  to: 'peter',    label: 'Validation' },
          { from: 'emily',  to: 'caroline', label: 'Automated billing' },
          { from: 'fred',   to: 'emily',    label: 'Reconciliation' },
        ],
        agentic: [
          // Type A: Active direction (always visible, persona-colored)
          { from: 'peter', to: 'a-model', type: 'direct', label: 'Directs' },

          // Type B: Policy guardrails (teal accent on agent, connections on hover)
          { from: 'fred',  to: 'a-model',     type: 'policy', label: 'RevRec rules' },
          { from: 'fred',  to: 'a-implement',  type: 'policy', label: 'RevRec constraints' },
          { from: 'fred',  to: 'a-contract',   type: 'policy', label: 'Policy boundaries' },
          { from: 'fred',  to: 'a-reconcile',  type: 'policy', label: 'Defines "correct"' },

          // Type C: Conditional review (invisible by default, connections on hover)
          { from: 'emily', to: 'a-implement',  type: 'conditional', label: 'Reviews (complex)' },
          { from: 'emily', to: 'a-validate',   type: 'conditional', label: 'Discrepancy review' },
          { from: 'diana', to: 'a-model',      type: 'conditional', label: 'New metrics' },

          // Agent chain — the operational spine, always prominent
          { from: 'a-model',     to: 'a-implement', type: 'chain' },
          { from: 'a-implement', to: 'a-validate',  type: 'chain' },
          { from: 'a-validate',  to: 'a-contract',  type: 'chain' },
          { from: 'a-contract',  to: 'a-reconcile', type: 'chain' },
          // Agent to Customer
          { from: 'a-contract',  to: 'caroline', type: 'chain', label: 'Invoice' },

          // Feedback / escalation loop (visible at moderate opacity)
          { from: 'a-reconcile', to: 'fred', type: 'feedback', label: 'Anomaly alerts' },
        ],
      };

      const curConns = conns[mode] || conns.slg;
      const curPos = pos[mode] || pos.slg;

      // Compute which agents are policy-governed (for teal accent stripe)
      const policyAgents = useMemo(() => {
        if (!isAgentic) return new Set();
        const s = new Set();
        curConns.forEach(c => {
          if (c.type === 'policy') s.add(c.to);
        });
        return s;
      }, [mode]);

      // === ZONES ===
      const zones = isAgentic
        ? [
            { label: 'Design & Validate', x: 55, w: 510, color: '#EEF2FF', border: '#C7D2FE', desc: 'Human-directed, agent-executed' },
            { label: 'Operate & Monitor', x: 620, w: 355, color: '#F5F3EF', border: '#D6CFC5', desc: 'Agent-driven, human-supervised' },
          ]
        : [
            { label: 'Strategy & Impact', x: 80, w: 200 },
            { label: 'Implement Changes', x: 310, w: 240 },
            { label: 'Test & Validate', x: 580, w: 160 },
            { label: 'Roll Out', x: 770, w: 210 },
          ];

      // === HOVER LOGIC ===
      const getNodePos = (id) => {
        if (id.startsWith('a-')) {
          const a = agents.find(ag => ag.id === id);
          return a ? { x: a.x, y: a.y } : null;
        }
        const c = curPos[id];
        return (c && !c.hidden) ? { x: c.x, y: c.y } : null;
      };

      const connected = useMemo(() => {
        if (!hovered) return null;
        const s = new Set([hovered]);
        curConns.forEach(c => {
          if (c.from === hovered) s.add(c.to);
          if (c.to === hovered) s.add(c.from);
        });
        return s;
      }, [hovered, mode]);

      const isLit = (id) => !connected || connected.has(id);

      // === RENDER ===
      const personaR = isAgentic ? 27 : 24;
      const agentHalfW = 52;
      const agentHalfH = 17;

      const PersonaNode = ({ id }) => {
        const p = P[id];
        const cfg = curPos[id];
        if (!cfg || cfg.hidden) return null;
        if (cfg.inactive) {
          return (
            <g className="node dimmed">
              <circle cx={cfg.x} cy={cfg.y} r="22" fill="none" stroke={p.color} strokeWidth="1.5" strokeDasharray="4 3" />
              <text x={cfg.x} y={cfg.y - 1} textAnchor="middle" fontSize="10" fill={p.color} fontWeight="600">{p.name}</text>
              <text x={cfg.x} y={cfg.y + 10} textAnchor="middle" fontSize="8" fill="#94A3B8">{p.role}</text>
            </g>
          );
        }
        const lit = isLit(id);
        return (
          <g className={`node ${lit ? '' : 'dimmed'}`}
             onMouseEnter={() => setHovered(id)} onMouseLeave={() => setHovered(null)}
             style={{ cursor: 'pointer' }}>
            <circle cx={cfg.x} cy={cfg.y} r={personaR} fill="white" stroke={p.color} strokeWidth="2.5" />
            <text x={cfg.x} y={cfg.y + (cfg.sub ? -6 : -1)} textAnchor="middle" fontSize="11" fill={p.color} fontWeight="700">{p.name}</text>
            <text x={cfg.x} y={cfg.y + (cfg.sub ? 5 : 10)} textAnchor="middle" fontSize="8" fill="#94A3B8">{p.role}</text>
            {cfg.sub && <text x={cfg.x} y={cfg.y + 16} textAnchor="middle" fontSize="8.5" fill={p.color} fontWeight="500" fontStyle="italic">{cfg.sub}</text>}
          </g>
        );
      };

      const AgentNode = ({ a }) => {
        const lit = isLit(a.id);
        const hasPolicy = policyAgents.has(a.id);
        return (
          <g className={`node ${lit ? '' : 'dimmed'}`}
             onMouseEnter={() => setHovered(a.id)} onMouseLeave={() => setHovered(null)}
             style={{ cursor: 'pointer' }}>
            <rect x={a.x - agentHalfW} y={a.y - agentHalfH} width={agentHalfW * 2} height={agentHalfH * 2} rx="6"
                  fill="#FAFAF8" stroke="#B8A88A" strokeWidth="1.5" />
            {/* Policy accent: teal left stripe for agents governed by Fred's rules */}
            {hasPolicy && (
              <rect x={a.x - agentHalfW + 1} y={a.y - agentHalfH + 3} width="3" height={agentHalfH * 2 - 6}
                    rx="1" fill="#0D9488" opacity="0.75" />
            )}
            <text x={a.x} y={a.y + 4} textAnchor="middle" fontSize="10.5" fill="#5C4B32" fontWeight="600">{a.name}</text>
          </g>
        );
      };

      const Conn = ({ c, i }) => {
        const fp = getNodePos(c.from);
        const tp = getNodePos(c.to);
        if (!fp || !tp) return null;

        const isDirect = c.type === 'direct';
        const isPolicy = c.type === 'policy';
        const isConditional = c.type === 'conditional';
        const isChain = c.type === 'chain';
        const isFeedback = c.type === 'feedback';
        const isFriction = c.friction;
        const isConnected = isLit(c.from) && isLit(c.to);

        // --- Opacity logic per connection type ---
        let opacity = 1;
        if (hovered) {
          // Something hovered: connected = full, else nearly invisible
          opacity = isConnected ? 1 : 0.1;
        } else if (isAgentic) {
          // Default state — layered visibility:
          if (isDirect) opacity = 1;           // Peter's trigger: always visible
          else if (isChain) opacity = 1;       // Agent spine: always visible
          else if (isFeedback) opacity = 0.45; // Feedback loop: moderate
          else if (isPolicy) opacity = 0;      // Policy: invisible (accent stripe hints)
          else if (isConditional) opacity = 0;  // Conditional: invisible
        }

        const dx = tp.x - fp.x;
        const dy = tp.y - fp.y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;

        // Offset from node edge
        const r1 = c.from.startsWith('a-') ? agentHalfW : personaR;
        const r2 = c.to.startsWith('a-') ? agentHalfW : personaR;
        const sx = fp.x + (dx / len) * r1;
        const sy = fp.y + (dy / len) * r1;
        const ex = tp.x - (dx / len) * r2;
        const ey = tp.y - (dy / len) * r2;

        // Curve
        const mx = (sx + ex) / 2;
        const my = (sy + ey) / 2;
        const px = -(ey - sy) / len;
        const py = (ex - sx) / len;

        let curve = 0;
        if (isFeedback) {
          curve = 35;
        } else if (Math.abs(dy) < 20) {
          curve = 10 + (i % 3) * 5;
        } else if (c.from === 'a-contract' && c.to === 'caroline') {
          curve = -15;
        }

        const cpx = mx + px * curve;
        const cpy = my + py * curve;
        const pathD = `M${sx},${sy} Q${cpx},${cpy} ${ex},${ey}`;

        // --- Stroke styling by type ---
        // Each type gets its own visual language
        const fromColor = P[c.from] ? P[c.from].color : '#F59E0B';
        let stroke, dash, sw;

        if (isDirect) {
          // Active direction: solid in Peter's purple
          stroke = fromColor;  // #7C3AED
          dash = '';
          sw = 2;
        } else if (isPolicy) {
          // Policy: teal, dashed — only visible on hover
          stroke = '#0D9488';
          dash = '4 3';
          sw = 1.5;
        } else if (isConditional) {
          // Conditional: persona-colored, fine dash — only visible on hover
          stroke = fromColor;
          dash = '3 2';
          sw = 1.2;
        } else if (isChain) {
          // Agent flow: warm bronze solid
          stroke = '#A38B5E';
          dash = '';
          sw = 2.5;
        } else if (isFeedback) {
          // Feedback: teal dashed
          stroke = '#0D9488';
          dash = '5 3';
          sw = 1.5;
        } else if (isFriction) {
          stroke = '#EF4444';
          dash = '';
          sw = 2;
        } else {
          // SLG/PLG default
          stroke = '#CBD5E1';
          dash = '';
          sw = 1.2;
        }

        // Arrow markers
        let markerId = 'arr';
        if (isFriction) markerId = 'arr-f';
        else if (isDirect) markerId = 'arr-direct';
        else if (isPolicy || isFeedback) markerId = 'arr-policy';
        else if (isChain) markerId = 'arr-a';
        else if (isConditional) markerId = 'arr-cond';

        // Labels: chain always visible, others on hover
        const showLabel = c.label && (
          (isChain && !hovered) ||
          (isDirect && !hovered) ||
          (hovered && isConnected)
        );

        return (
          <g className="conn" style={{ opacity, transition: 'opacity 0.3s ease' }}>
            <path d={pathD} fill="none" stroke={stroke} strokeWidth={sw} strokeDasharray={dash}
                  markerEnd={`url(#${markerId})`} />
            {showLabel && (
              <text x={cpx} y={cpy - 7} textAnchor="middle" fontSize="8.5"
                    fill={
                      isFriction ? '#EF4444' :
                      isDirect ? '#6D28D9' :
                      isPolicy ? '#0D9488' :
                      isConditional ? '#64748B' :
                      isChain ? '#6B5B3E' :
                      isFeedback ? '#0D9488' :
                      '#94A3B8'
                    }
                    fontWeight={(isDirect || isFriction) ? '600' : '400'}>
                {c.label}
              </text>
            )}
          </g>
        );
      };

      // Seam data
      const seams = [
        { id: 's1', label: 'Emily \u2192 Oliver',
          was: 'Invisible upstream constraints',
          now: 'Are constraints expressed as checkable rules?',
          detail: 'Agent traverses the constraint graph before acting. The Smartcar $0 invoice becomes a pre-commit check.' },
        { id: 's2', label: 'Fred as last-stop',
          was: 'Errors found at month-end',
          now: 'Has Fred defined what \u201ccorrect\u201d looks like?',
          detail: 'Reconciliation runs continuously. Fred moves from downstream detective to upstream policy author.' },
        { id: 's3', label: 'Diana as intermediary',
          was: 'Data translation bottleneck',
          now: 'Can agents translate between domains?',
          detail: 'Revenue Modeling Agent speaks both billing and finance vocabulary. The intermediary chain collapses.' },
      ];

      return (
        <div className="max-w-4xl mx-auto py-8">
          {/* Header */}
          <div className="px-4 mb-5">
            <h1 className="text-lg font-bold text-gray-900">Pricing Change Journey Map</h1>
            <p className="text-sm text-gray-500 mt-0.5">How a pricing change flows through the persona ecosystem</p>
          </div>

          {/* Toggle */}
          <div className="px-4 mb-4 flex items-center gap-2">
            {['slg', 'plg', 'agentic'].map(m => (
              <button key={m} onClick={() => { setMode(m); setHovered(null); }}
                className={`px-3 py-1.5 rounded-md text-xs font-semibold transition-all ${
                  mode === m
                    ? (m === 'agentic' ? 'bg-stone-100 text-stone-700 border border-stone-300' : 'bg-indigo-50 text-indigo-700 border border-indigo-200')
                    : 'bg-gray-100 text-gray-500 border border-transparent hover:bg-gray-200'
                }`}>
                {m === 'slg' ? 'SLG' : m === 'plg' ? 'PLG' : 'Agentic'}
              </button>
            ))}
            {isAgentic && <span className="text-xs text-stone-500 ml-2 italic">Hypothesis</span>}
          </div>

          {/* SVG */}
          <div className="px-4">
            <svg viewBox={`0 0 ${svgW} ${svgH}`} className="w-full" style={{ minHeight: isAgentic ? 330 : 360 }}>
              <defs>
                <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
                  <path d="M0,0 L7,2.5 L0,5z" fill="#CBD5E1" />
                </marker>
                <marker id="arr-f" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
                  <path d="M0,0 L7,2.5 L0,5z" fill="#EF4444" />
                </marker>
                <marker id="arr-a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                  <path d="M0,0 L8,3 L0,6z" fill="#A38B5E" />
                </marker>
                <marker id="arr-direct" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                  <path d="M0,0 L8,3 L0,6z" fill="#7C3AED" />
                </marker>
                <marker id="arr-policy" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
                  <path d="M0,0 L7,2.5 L0,5z" fill="#0D9488" />
                </marker>
                <marker id="arr-cond" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
                  <path d="M0,0 L7,2.5 L0,5z" fill="#475569" />
                </marker>
              </defs>

              {/* Zone backgrounds */}
              {zones.map((z, i) => (
                <g key={i}>
                  <rect x={z.x} y="22" width={z.w} height={svgH - 30} rx="10"
                        fill={z.color || '#F8FAFC'} stroke={z.border || '#E2E8F0'}
                        strokeWidth={isAgentic ? 1.5 : 1}
                        opacity={isAgentic ? 0.75 : 0.25} />
                  <text x={z.x + z.w / 2} y="42" textAnchor="middle"
                        fontSize={isAgentic ? '11.5' : '10.5'}
                        fill="#334155" fontWeight="700">{z.label}</text>
                  {z.desc && <text x={z.x + z.w / 2} y="56" textAnchor="middle" fontSize="9.5" fill="#94A3B8" fontStyle="italic">{z.desc}</text>}
                </g>
              ))}

              {/* Go-live boundary */}
              {isAgentic && (
                <g>
                  <line x1="595" y1="27" x2="595" y2={svgH - 14} stroke="#64748B" strokeWidth="1.5" strokeDasharray="6 4" opacity="0.4" />
                  <rect x="561" y={(lyAg.judgment + lyAg.agents) / 2 - 10} width="68" height="20" rx="4" fill="#475569" opacity="0.9" />
                  <text x="595" y={(lyAg.judgment + lyAg.agents) / 2 + 4} textAnchor="middle" fontSize="8" fill="white" fontWeight="700" letterSpacing="0.5">GO-LIVE</text>
                </g>
              )}

              {/* Layer labels */}
              {isAgentic ? (
                <g>
                  <text x="12" y={lyAg.judgment - 2} fontSize="9.5" fill="#7C3AED" fontWeight="600" opacity="0.7">Human</text>
                  <text x="12" y={lyAg.judgment + 9} fontSize="9.5" fill="#7C3AED" fontWeight="600" opacity="0.7">Judgment</text>
                  <text x="12" y={lyAg.judgment + 20} fontSize="7.5" fill="#7C3AED" opacity="0.45" fontStyle="italic">strategy &#8211; policy</text>
                  <line x1="60" y1={lyAg.judgment} x2={svgW - 20} y2={lyAg.judgment} stroke="#7C3AED" strokeWidth="0.5" opacity="0.08" />

                  <text x="12" y={lyAg.agents - 2} fontSize="9.5" fill="#8B7355" fontWeight="600" opacity="0.7">Agent</text>
                  <text x="12" y={lyAg.agents + 9} fontSize="9.5" fill="#8B7355" fontWeight="600" opacity="0.7">Execution</text>
                  <text x="12" y={lyAg.agents + 20} fontSize="7.5" fill="#8B7355" opacity="0.45" fontStyle="italic">minutes &#8211; continuous</text>
                  <line x1="60" y1={lyAg.agents} x2={svgW - 20} y2={lyAg.agents} stroke="#8B7355" strokeWidth="0.5" opacity="0.08" />

                  <text x="12" y={lyAg.customer + 4} fontSize="9.5" fill="#0D9488" fontWeight="600" opacity="0.7">Customer</text>
                  <line x1="60" y1={lyAg.customer} x2={svgW - 20} y2={lyAg.customer} stroke="#0D9488" strokeWidth="0.5" opacity="0.08" />
                </g>
              ) : (
                <g>
                  {[
                    { y: lySlg.pricing, label: 'Pricing', color: '#7C3AED' },
                    { y: lySlg.operations, label: 'Operations', color: '#4F46E5' },
                    { y: lySlg.infrastructure, label: 'Infrastructure', color: '#475569' },
                    { y: lySlg.customer, label: 'Customer', color: '#0D9488' },
                  ].map((l, i) => (
                    <g key={i}>
                      <text x="12" y={l.y + 4} fontSize="8" fill={l.color} fontWeight="600" opacity="0.55">{l.label}</text>
                      <line x1="80" y1={l.y} x2={svgW - 20} y2={l.y} stroke={l.color} strokeWidth="0.4" opacity="0.1" />
                    </g>
                  ))}
                </g>
              )}

              {/* Connections (render before nodes) */}
              {curConns.map((c, i) => <Conn key={`${c.from}-${c.to}-${i}`} c={c} i={i} />)}

              {/* Persona nodes */}
              {Object.keys(P).map(id => <PersonaNode key={id} id={id} />)}

              {/* Agent nodes */}
              {agents.map(a => <AgentNode key={a.id} a={a} />)}
            </svg>
          </div>

          {/* Legend */}
          <div className="flex flex-wrap items-center gap-x-5 gap-y-1 text-xs text-gray-400 mt-1 px-4">
            {!isAgentic && <>
              <span className="flex items-center gap-1.5"><span className="inline-block w-4 h-px bg-gray-300"></span> Handoff</span>
              <span className="flex items-center gap-1.5"><span className="inline-block w-4 bg-red-400" style={{height:2}}></span> Friction</span>
            </>}
            {isAgentic && <>
              <span className="flex items-center gap-1.5"><span className="inline-block w-5 border-t-2" style={{borderColor:'#A38B5E'}}></span> Agent flow</span>
              <span className="flex items-center gap-1.5"><span className="inline-block w-5 border-t-2 border-purple-500"></span> Active direction</span>
              <span className="flex items-center gap-1.5">
                <span className="inline-block w-1 h-3 rounded-sm bg-teal-600 opacity-70 mr-0.5"></span>
                <span className="inline-block w-3 h-3 rounded-sm border" style={{background:'#FAFAF8', borderColor:'#B8A88A'}}></span> Policy-governed
              </span>
              <span className="flex items-center gap-1.5 text-gray-300">Hover humans to see: policy &middot; conditional review</span>
            </>}
          </div>

          {/* Summary card */}
          <div className="px-4 mt-5">
            {!isAgentic ? (
              <div className="bg-white rounded-lg p-4 shadow-sm border border-gray-100">
                <div className="text-xs font-semibold text-gray-500 mb-1">
                  {mode === 'slg' ? '4 phases, 6 personas, sequential handoffs' : '4 phases, 5 personas \u2014 Oliver disappears in PLG'}
                </div>
                <div className="text-sm text-gray-600">
                  {mode === 'slg'
                    ? 'A pricing change passes through Strategy \u2192 Implement \u2192 Test \u2192 Roll Out. Different people own different phases. Friction concentrates at the Emily \u2192 Oliver handoff (invisible upstream constraints) and at month-end close (Fred discovers errors last).'
                    : 'Without an ops intermediary, Emily\u2019s implementation goes directly to Caroline. But most customers run both motions \u2014 the same objects serve SLG and PLG simultaneously.'
                  }
                </div>
              </div>
            ) : (
              <div className="bg-stone-50 rounded-lg p-4 shadow-sm border border-stone-200">
                <div className="text-xs font-semibold text-stone-600 mb-1">2 modes, 3 types of human judgment (4 people), 5 agents organized by blast radius</div>
                <div className="text-sm text-gray-700">
                  Strategy, implementation, and testing merge into a single iterative loop (<strong>Design &amp; Validate</strong>). Peter describes intent, agents implement and simulate, humans evaluate. The go-live decision is the one human gate. Then agents handle ongoing operations (<strong>Operate &amp; Monitor</strong>) &mdash; contract configuration, invoicing, continuous reconciliation. The coordination seams transform from visibility gaps to specification gaps.
                </div>
              </div>
            )}
          </div>

          {/* Seam transformations (agentic only) */}
          {isAgentic && (
            <div className="px-4 mt-4">
              <div className="text-xs font-medium text-gray-400 mb-2">Coordination seams: hover for detail</div>
              <div className="flex gap-3">
                {seams.map(s => (
                  <div key={s.id}
                       className="flex-1 bg-white rounded-lg border border-gray-100 p-3 transition-all hover:shadow-md cursor-default relative"
                       onMouseEnter={() => setHoveredSeam(s.id)}
                       onMouseLeave={() => setHoveredSeam(null)}>
                    <div className="text-xs font-medium text-gray-500 mb-1">{s.label}</div>
                    <div className="text-xs text-gray-600 line-through decoration-gray-400 decoration-2">{s.was}</div>
                    <div className="text-xs font-semibold text-indigo-600 mt-1">{s.now}</div>
                    {hoveredSeam === s.id && (
                      <div className="absolute left-0 right-0 top-full mt-1 bg-white border border-gray-200 rounded-lg p-3 shadow-lg z-10 fade-in">
                        <div className="text-xs text-gray-600 leading-relaxed">{s.detail}</div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Footer */}
          <div className="px-4 mt-6 pt-3 border-t border-gray-100">
            <p className="text-xs text-gray-400">
              Responds to <a href="https://docs.google.com/document/d/1XnmU6Gpeef-c-01t155R52q82NCPhp4Y3zjh8ri1-jM/edit" className="text-indigo-400 hover:underline">Agentic Monetization Strategy</a> (Thread 2) &middot; Extends <a href="https://docs.google.com/document/d/1cCmLXhsy9xZeq3haC8Wi8y2wOmFkeDkOJgOP0VfoXPQ/edit" className="text-indigo-400 hover:underline">AI in Metronome UI</a>
            </p>
          </div>
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
